# Hot reload configuration for development with Air
# Install: go install github.com/cosmtrek/air@latest
# Run: air

root = "."
testdata_dir = "tests"
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api/main.go"
  bin = "./tmp/api"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor", "bin", "dist"]
  include_dir = []
  include_files = []
  exclude_files = []
  delay = 1000 # milliseconds
  stop_on_error = false
  log = "build-errors.log"
  send_interrupt = false
  kill_delay = 0

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  yellow = "yellow"
  green = "green"
  red = "red"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true
